<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Forest Inventory - Offline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f6f4e">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<style>
body { margin:0; font-family:system-ui,sans-serif; background:#f4f6f5; }
header { background:#2f6f4e; color:#fff; padding:10px; display:flex; gap:10px; }
header button { background:rgba(255,255,255,.2); border:none; color:#fff; padding:6px 10px; border-radius:4px; }
header strong { align-items: center;}
main { padding:12px; }
.card { background:#fff; padding:12px; border-radius:8px; margin-bottom:10px; border:1px solid #ddd; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
.flex-row { display: flex; gap: 8px; }
button { padding:6px 10px; border:none; border-radius:4px; background:#4f8f6f; color:#fff; cursor:pointer; }
button.danger { background:#c0392b; }
button.secondary { background:#777; }
input, textarea { box-sizing: border-box; width:100%; margin:4px 0; padding:6px; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:6px; text-align:left; }
.actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
#map { box-sizing: border-box; height:450px; width:100%; margin-top:10px; }
.hidden { display:none; }

/* Input styling for spreadsheet tables */
.cell-input { width: 100%; border: none; background: transparent; padding: 0; outline: none; margin: 0; min-width: 40px; font-family: inherit; font-size: inherit; }
</style>
</head>

<body>

<div id="app">
  <header>
    <button v-show="nav.view !== 'units'" @click="goBack">◀ Back</button>
    <strong>{{ title }}</strong>
  </header>

  <main>
    <component v-if="dbReady" :is="currentComponent" :nav-data="nav" @nav="navigate" @update-title="title = $event"></component>
  </main>
</div>

<script type="module">
import { openDB } from './db.js';
import UnitsView from './components/Units.js';
import UnitView from './components/Unit.js';
import PlotsView from './components/Plots.js';
import DesignsView from './components/Designs.js';
import TreesView from './components/Trees.js';
import LogsView from './components/Logs.js';

const { createApp, ref, computed, shallowRef, onMounted } = Vue;

const App = {
    setup() {
        const nav = ref({ view: "units", prev: null });
        const title = ref("Units");
        const dbReady = ref(false);

        onMounted(async () => {
            await openDB();
            dbReady.value = true;
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js');
            }
        });

        const currentComponent = computed(() => {
            switch (nav.value.view) {
                case 'units': return shallowRef(UnitsView);
                case 'unit': return shallowRef(UnitView);
                case 'plots': return shallowRef(PlotsView);
                case 'designs': return shallowRef(DesignsView);
                case 'trees': return shallowRef(TreesView);
                case 'logs': return shallowRef(LogsView);
            }
        });

        const navigate = (newNav) => {
            nav.value = { ...newNav, prev: nav.value };
        };

        const goBack = () => {
            if (nav.value.prev) nav.value = nav.value.prev;
        };

        return { nav, title, currentComponent, navigate, goBack, dbReady };
    }
};

createApp(App).mount('#app');
</script>
</body>
</html>

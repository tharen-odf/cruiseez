<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Forest Inventory - Offline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2f6f4e">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<!-- Geoman -->
<link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

<link rel="stylesheet" href="./styles.css">
</head>

<body>

<div id="app">
  <header>
    <button v-show="nav.view !== 'units'" @click="goBack">◀ Back</button>
    <button v-show="nav.view == 'units'">Home</button>
    <strong>{{ title }}</strong>
    <button v-show="nav.view !== 'setup'" @click="openSetup">☰</button>
    <button v-show="nav.view == 'setup'">☰</button>
  </header>

  <main>
    <component v-if="dbReady" :is="currentComponent" :nav-data="nav" @nav="navigate" @update-title="title = $event"></component>
  </main>
</div>

<script type="module">
import { openDB } from './db.js';
import UnitsView from './components/Units.js';
import UnitView from './components/Unit.js';
import PlotsView from './components/Plots.js';
import DesignsView from './components/Designs.js';
import TreesView from './components/Trees.js';
import LogsView from './components/Logs.js';
import SetupView from './components/Setup.js';

const { createApp, ref, computed, onMounted } = Vue;

const App = {
    setup() {
        const nav = ref({ view: "units", prev: null });
        const title = ref("Units");
        const dbReady = ref(false);

        onMounted(async () => {
            await openDB();
            dbReady.value = true;
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js');
            }
        });

        const currentComponent = computed(() => {
            switch (nav.value.view) {
                case 'units': return UnitsView;
                case 'unit': return UnitView;
                case 'plots': return PlotsView;
                case 'designs': return DesignsView;
                case 'trees': return TreesView;
                case 'logs': return LogsView;
                case 'setup': return SetupView;
            }
        });

        const navigate = (newNav) => {
            nav.value = { ...newNav, prev: nav.value };
        };

        const goBack = () => {
            if (nav.value.prev) nav.value = nav.value.prev;
        };

        const openSetup = () => {
            navigate({ view: 'setup' });
        };

        return { nav, title, currentComponent, navigate, goBack, dbReady, openSetup };
    }
};

createApp(App).mount('#app');
</script>
</body>
</html>
